spring.application.name=online-exam-system

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/oerms_db
spring.datasource.username=root
spring.datasource.password=Root@1234

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SERVER
server.port=8080

# ─── JWT Configuration ───────────────────────────────────────────────────────
# Secret key: Base64-encoded 256-bit HMAC-SHA256 key
# Generate your own with: openssl rand -base64 32
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgdGhlIG9lcm1zIHByb2plY3Q=
# Token expiration: 24 hours in milliseconds (24 * 60 * 60 * 1000)
jwt.expiration=86400000